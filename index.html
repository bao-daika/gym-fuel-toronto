<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Fuel Toronto | Manager Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { height: 100%; margin: 0; background: #0b0f1a; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .glass { background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.3); }
        .active-cat { background: #2563eb !important; color: white !important; }
        .custom-marker { background: transparent !important; border: none !important; }
        
        .custom-tooltip {
            background: rgba(17, 24, 39, 0.95) !important;
            border: 1px solid rgba(59, 130, 246, 0.5) !important;
            color: white !important;
            border-radius: 8px !important;
            padding: 5px 10px !important;
            font-size: 12px !important;
            font-weight: bold !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
            white-space: nowrap;
        }
        .leaflet-tooltip-top:before { border-top-color: transparent !important; }

        .user-dot { width: 15px; height: 15px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px #3b82f6; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 70% { transform: scale(1.3); opacity: 0.3; } 100% { transform: scale(0.9); opacity: 1; } }
        .leaflet-control-attribution { display: none !important; }

        /* --- GAME UI --- */
        #game-container { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 90vh; padding: 20px 10px 0 10px; }
        .canvas-frame { position: relative; border: 6px solid #1e293b; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(59, 130, 246, 0.2); line-height: 0; max-width: 100%; }
        canvas { background: linear-gradient(to bottom, #1e3a8a, #0b0f1a); max-width: 100%; height: auto !important; }
        .bicep-controls { display: flex; width: 100%; max-width: 340px; justify-content: space-between; margin-top: 25px; align-items: center; }
        .bicep-btn { width: 75px; height: 75px; border-radius: 50%; border: none; background: #1e293b; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 #020617, 0 10px 20px rgba(0,0,0,0.4); transition: all 0.1s ease; -webkit-tap-highlight-color: transparent; font-size: 35px; filter: grayscale(1) brightness(1.5); }
        .bicep-btn:active, .keyboard-active { transform: translateY(4px) scale(1.1); box-shadow: 0 2px 0 #020617, 0 5px 10px rgba(0,0,0,0.4); background: #3b82f6; filter: none; }
        .left-arm span { transform: scaleX(-1); display: inline-block; }
        .game-tag { color: #475569; font-weight: 900; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; text-align: center; flex: 1; }

        /* --- CHATBOT UI --- */
        #chatbot-bubble {
            position: absolute; bottom: 25px; right: 25px; z-index: 3000;
            width: 65px; height: 65px; border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid rgba(255,255,255,0.2);
            animation: chatbot-pulse 3s infinite;
        }
        #chatbot-panel {
            position: absolute; bottom: 100px; right: 25px; z-index: 3001;
            width: 320px; height: 450px; 
            display: none; flex-direction: column;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes chatbot-pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
    </style>
</head>
<body>

    <div class="relative h-full w-full">
        <div class="absolute top-0 left-0 right-0 z-[1000] p-4 flex justify-between items-center pointer-events-none">
            <button onclick="toggleMenu()" class="p-3 glass rounded-xl text-white pointer-events-auto shadow-lg active:scale-90 transition"><i data-lucide="menu"></i></button>
            <div class="flex items-center gap-2 px-4 py-2 rounded-full glass text-sm font-bold pointer-events-auto text-white border border-blue-500/30">
                <span id="header-text">Protein Good Food</span>
            </div>
            <button id="track-btn" onclick="toggleTracking()" class="p-3 glass rounded-xl text-blue-400 pointer-events-auto border border-blue-500/20 active:scale-90 transition"><i data-lucide="crosshair"></i></button>
        </div>

        <div id="sidebar" class="hidden absolute top-20 left-4 z-[1000] w-72 glass rounded-3xl p-5 shadow-2xl text-white max-h-[80vh] overflow-y-auto">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 ml-1">Categories</h2>
            <div id="category-list" class="space-y-2 mb-6"></div>
        </div>

        <div id="detail-view" class="hidden absolute inset-0 z-[2000] bg-[#0b0f1a] overflow-y-auto p-4 text-white">
            <div class="max-w-2xl mx-auto h-full">
                <div id="detail-content-injector"></div>
            </div>
        </div>

        <div id="map"></div>

        <div id="chatbot-bubble" onclick="toggleChat()" class="pointer-events-auto">
            <i data-lucide="message-circle" class="text-white w-8 h-8"></i>
            <div class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full border-2 border-[#0b0f1a]"></div>
        </div>

        <div id="chatbot-panel" class="glass rounded-3xl overflow-hidden shadow-2xl border border-blue-500/20 flex flex-col pointer-events-auto">
            <div class="bg-blue-600 p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center"><i data-lucide="crown" class="text-white w-5 h-5"></i></div>
                    <div>
                        <div class="text-xs font-black text-white leading-none tracking-tighter">TORONTO FITNESS BOSS</div>
                        <div class="text-[10px] text-blue-200 mt-1 uppercase font-bold">Downtown Core | Online</div>
                    </div>
                </div>
                <button onclick="toggleChat()" class="text-white/50 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm scrollbar-hide">
    <div class="bg-blue-500/10 border border-blue-500/20 rounded-2xl p-3 text-blue-100 italic">
        Hello, I am the Toronto Fitness Boss! I'm smarter than ChatGPT and Gemini about Fitness in Downtown Toronto. How can I help you?
    </div>
</div>
            <div class="p-3 bg-black/20 border-t border-white/5 flex gap-2">
                <input id="chat-input" type="text" placeholder="Ask about Downtown..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs text-white focus:outline-none focus:border-blue-500/50">
                <button onclick="sendMessage()" class="bg-blue-600 p-2 rounded-xl text-white active:scale-90 transition"><i data-lucide="send" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="data_food.js"></script>
    <script src="data_gym.js"></script>
    <script src="data_diet.js"></script> 
    <script src="motivation.js"></script> 
    <script src="game.js"></script>
    
    <script src="chatbot_brain.js"></script>
    <script src="chatbot_ui.js"></script>

    <script>
        // --- MAP & CORE LOGIC (GIỮ NGUYÊN 100% LOGIC CỦA ANH) ---
        const allStores = [...(typeof foodStores !== 'undefined' ? foodStores : []), 
                          ...(typeof gymStores !== 'undefined' ? gymStores : [])];

        const torontoBounds = L.latLngBounds(
            L.latLng(43.635, -79.410), 
            L.latLng(43.665, -79.375)
        );

        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            minZoom: 14,
            maxBounds: torontoBounds,
            maxBoundsViscosity: 1.0
        }).setView([43.6532, -79.3932], 15);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let markerGroup = L.layerGroup().addTo(map);
        let activeCategory = "Protein Good Food";
        let userMarker = null;
        let watchId = null;
        let isTracking = false;

        function renderMarkers() {
            markerGroup.clearLayers();
            allStores.filter(s => s.category === activeCategory).forEach(store => {
                const color = (typeof markerColors !== 'undefined' && markerColors[store.sub_type]) ? markerColors[store.sub_type] : "#2563eb";
                const icon = L.divIcon({
                    className: "custom-marker",
                    html: `<div style="width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow: 0 0 10px ${color}88;"><div style="width:8px;height:8px;border-radius:50%;background:white;transform:rotate(45deg)"></div></div>`,
                    iconSize: [24, 24], iconAnchor: [12, 24]
                });

                L.marker([store.lat, store.lng], { icon })
                    .addTo(markerGroup)
                    .bindTooltip(store.store, { direction: 'top', offset: [0, -20], className: 'custom-tooltip' })
                    .on('click', () => showDetail(store.id));
            });
        }

        window.showDetail = function(id) {
            const store = allStores.find(s => s.id === id);
            if (!store) return;
            const injector = document.getElementById('detail-content-injector');
            // SỬA LỖI CÚ PHÁP: Template literal chuẩn cho Google Maps
            let commonHeader = `
                <div class="flex justify-between items-center mb-6 sticky top-0 z-[2001] bg-[#0b0f1a]/95 py-2">
                    <button onclick="closeDetail()" class="flex items-center gap-2 text-blue-400 p-2 font-bold"><i data-lucide="arrow-left"></i> BACK</button>
                    <button onclick="window.open('https://www.google.com/maps?q=${store.lat},${store.lng}')" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold active:scale-95 transition tracking-widest uppercase">Directions</button>
                </div>`;
            injector.innerHTML = commonHeader + (typeof store.render === 'function' ? store.render(store) : 'Detail not available');
            document.getElementById('detail-view').classList.remove('hidden');
            lucide.createIcons();
        };

        window.renderDietKnowledge = function() {
            const injector = document.getElementById('detail-content-injector');
            const articles = (typeof dietArticles !== 'undefined' ? dietArticles : []);
            let html = `<div class="flex justify-between items-center mb-6 sticky top-0 z-[2001] bg-[#0b0f1a]/95 py-2">
                            <button onclick="closeDetail()" class="flex items-center gap-2 text-blue-400 p-2 font-bold"><i data-lucide="arrow-left"></i> BACK TO MAP</button>
                            <span class="text-xs font-bold text-gray-500 uppercase">Diet Knowledge</span>
                        </div><div class="grid grid-cols-1 gap-4 pb-20">`;
            articles.forEach(art => {
                html += `<div onclick="showFullArticle('${art.id}')" class="glass rounded-2xl overflow-hidden active:scale-95 transition cursor-pointer border border-gray-800">
                            <div class="h-48 bg-gray-800 relative"><img src="${art.thumbnail}" class="w-full h-full object-cover opacity-80"></div>
                            <div class="p-4"><h3 class="font-bold text-white text-xl">${art.title}</h3><p class="text-gray-400 text-xs mt-2 line-clamp-2">${art.description}</p></div>
                        </div>`;
            });
            html += `</div>`;
            injector.innerHTML = html;
            document.getElementById('detail-view').classList.remove('hidden');
            lucide.createIcons();
        };

        window.showFullArticle = function(id) {
            const art = dietArticles.find(a => a.id === id);
            if (!art) return;
            document.getElementById('detail-content-injector').innerHTML = `
                <div class="flex justify-between items-center mb-6 sticky top-0 z-[2001] bg-[#0b0f1a]/95 py-2">
                    <button onclick="renderDietKnowledge()" class="flex items-center gap-2 text-blue-400 p-2 font-bold"><i data-lucide="arrow-left"></i> BACK</button>
                </div>
                <div class="pb-20 article-view"><h1 class="text-2xl font-black mb-6 leading-tight">${art.title}</h1><div class="text-gray-300 leading-relaxed">${art.content}</div></div>`;
            document.getElementById('detail-view').scrollTop = 0;
            lucide.createIcons();
        };

        window.renderExerciseKnowledge = function() {
            const injector = document.getElementById('detail-content-injector');
            const articles = (typeof exerciseArticles !== 'undefined' ? exerciseArticles : []);
            let html = `<div class="flex justify-between items-center mb-6 sticky top-0 z-[2001] bg-[#0b0f1a]/95 py-2">
                            <button onclick="closeDetail()" class="flex items-center gap-2 text-blue-400 p-2 font-bold"><i data-lucide="arrow-left"></i> BACK TO MAP</button>
                            <span class="text-xs font-bold text-gray-500 uppercase">Exercises Knowledge</span>
                        </div><div class="grid grid-cols-1 gap-4 pb-20">`;
            articles.forEach(art => {
                html += `<div onclick="showFullExercise('${art.id}')" class="glass rounded-2xl overflow-hidden active:scale-95 transition cursor-pointer border border-gray-800">
                            <div class="h-48 bg-gray-800 relative"><img src="${art.thumbnail}" class="w-full h-full object-cover opacity-80"></div>
                            <div class="p-4"><h3 class="font-bold text-white text-xl">${art.title}</h3><p class="text-gray-400 text-xs mt-2 line-clamp-2">${art.description}</p></div>
                        </div>`;
            });
            html += `</div>`;
            injector.innerHTML = html;
            document.getElementById('detail-view').classList.remove('hidden');
            lucide.createIcons();
        };

        window.showFullExercise = function(id) {
            const art = exerciseArticles.find(a => a.id === id);
            if (!art) return;
            document.getElementById('detail-content-injector').innerHTML = `
                <div class="flex justify-between items-center mb-6 sticky top-0 z-[2001] bg-[#0b0f1a]/95 py-2">
                    <button onclick="renderExerciseKnowledge()" class="flex items-center gap-2 text-blue-400 p-2 font-bold"><i data-lucide="arrow-left"></i> BACK</button>
                </div>
                <div class="pb-20 article-view"><h1 class="text-2xl font-black mb-6 leading-tight">${art.title}</h1><div class="text-gray-300 leading-relaxed">${art.content}</div></div>`;
            document.getElementById('detail-view').scrollTop = 0;
            lucide.createIcons();
        };

        window.openEntertainments = function() {
            const injector = document.getElementById('detail-content-injector');
            injector.innerHTML = `
                <div class="flex justify-between items-center mb-4 sticky top-0 z-[2001] bg-[#0b0f1a]/95 py-2">
                    <button onclick="closeDetail()" class="flex items-center gap-2 text-blue-400 p-2 font-bold"><i data-lucide="arrow-left"></i> BACK TO MAP</button>
                    <span class="text-[10px] font-black uppercase tracking-widest text-blue-500 bg-blue-500/10 px-3 py-1 rounded-full">Gym Fuel Pump</span>
                </div>
                <div id="game-container">
                    <div class="canvas-frame"><canvas id="waterGameCanvas" width="340" height="480"></canvas></div>
                    <div class="bicep-controls">
                        <button id="btn-left" onmousedown="if(window.pushWater) pushWater('left')" ontouchstart="if(window.pushWater) pushWater('left')" class="bicep-btn left-arm"><span>💪</span></button>
                        <div class="game-tag">PUMP IT</div>
                        <button id="btn-right" onmousedown="if(window.pushWater) pushWater('right')" ontouchstart="if(window.pushWater) pushWater('right')" class="bicep-btn right-arm"><span>💪</span></button>
                    </div>
                </div>`;
            document.getElementById('detail-view').classList.remove('hidden');
            lucide.createIcons();
            if (window.initGame) window.initGame();
        };

        window.toggleTracking = () => {
            const btn = document.getElementById('track-btn');
            if (!isTracking) {
                isTracking = true; btn.classList.add('bg-blue-500', 'text-white');
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const latlng = [pos.coords.latitude, pos.coords.longitude];
                    if (userMarker) userMarker.setLatLng(latlng);
                    else userMarker = L.marker(latlng, { icon: L.divIcon({ className: "custom-marker", html: `<div class="user-dot"></div>` }) }).addTo(map);
                    map.flyTo(latlng, 17);
                }, (err) => console.log(err), { enableHighAccuracy: true });
            } else {
                isTracking = false; btn.classList.remove('bg-blue-500', 'text-white');
                navigator.geolocation.clearWatch(watchId);
            }
        };

        window.closeDetail = () => {
            document.getElementById('detail-view').classList.add('hidden');
            if (window.stopGame) window.stopGame();
        };
        
        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('hidden');

        window.renderSidebar = function() {
            const baseCategories = (typeof categories !== 'undefined' ? categories : []);
            const extraFeatures = [
                { label: "Exercises Knowledge", icon: "book-open" },
                { label: "Diet Knowledge", icon: "apple" },
                { label: "Entertainments", icon: "gamepad-2" }
            ];
            const menuItems = [...baseCategories, ...extraFeatures];
            document.getElementById('category-list').innerHTML = menuItems.map(cat => `
                <button onclick="selectCategory('${cat.label}')" class="w-full flex items-center gap-4 p-3 rounded-2xl transition ${activeCategory === cat.label ? 'active-cat' : 'text-gray-400'}">
                    <div class="p-2 rounded-lg ${activeCategory === cat.label ? 'bg-white/20' : 'bg-gray-800'}"><i data-lucide="${cat.icon}" class="w-5 h-5"></i></div>
                    <div class="text-left font-bold text-sm">${cat.label}</div>
                </button>`).join('');
            lucide.createIcons();
        }

        window.selectCategory = (l) => { 
            if (l === "Entertainments") { openEntertainments(); toggleMenu(); return; }
            if (l === "Diet Knowledge") { renderDietKnowledge(); toggleMenu(); return; }
            if (l === "Exercises Knowledge") { renderExerciseKnowledge(); toggleMenu(); return; }
            activeCategory = l; 
            document.getElementById('header-text').innerText = l; 
            renderMarkers(); renderSidebar(); toggleMenu(); 
        };

        // Khởi tạo
        renderMarkers(); 
        renderSidebar(); 
        lucide.createIcons();
    </script>
</body>
</html>
